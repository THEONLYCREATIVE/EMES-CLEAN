<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#00c896">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="No7 Analytics">
  <meta name="description" content="No7 Beauty Dubai Airport T3 — Sales Analytics Platform">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="icon" type="image/png" href="assets/icons/icon-192.png">
  <title>No7 · Analytics</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- External libs via CDN — no build step required -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  NO7 ANALYTICS — App Shell                                   ║
    ║  All UI is rendered into #app by src/app.js                  ║
    ║  Nothing lives in this file except the shell.               ║
    ╚══════════════════════════════════════════════════════════════╝
  -->
  <div id="app">
    <!-- Initial loader — replaced once JS runs -->
    <div id="boot-loader">
      <div class="boot-logo">
        <div class="boot-mark">N7</div>
        <div class="boot-text">Loading…</div>
      </div>
    </div>
  </div>

  <!-- Hidden camera input — shared across all views -->
  <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

  <!-- Toast notification container -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- Confetti / success overlay -->
  <div id="successOverlay" class="success-overlay" aria-hidden="true">
    <div class="success-burst" id="successBurst">🎯</div>
  </div>

  <!-- ES Module entry point -->
  <script type="module" src="src/app.js"></script>
</body>
</html>
